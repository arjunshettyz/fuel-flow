<nav class="navbar" [class.scrolled]="scrolled" aria-label="Primary navigation">
  <div class="navbar-inner">
    <a class="brand" routerLink="/" (click)="closeMobile()">
      <span class="brand-mark" aria-hidden="true"></span>
      <span class="brand-name">Fuel<span>Flow</span></span>
    </a>

    <ul class="nav-links" *ngIf="user">
      <li *ngFor="let link of navLinks; trackBy: trackByPath">
        <a [routerLink]="link.path" routerLinkActive="active" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>
    <ul class="nav-links" *ngIf="!user">
      <li *ngFor="let link of publicLinks; trackBy: trackByFragment">
        <a [routerLink]="['/']" [fragment]="link.fragment" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>

    <div class="nav-right">
      <div class="nav-actions" *ngIf="!user">
        <a routerLink="/" fragment="contact" class="outline-btn btn-sm">Contact</a>
        <a routerLink="/auth/login" class="primary-btn btn-sm">Log In</a>
      </div>
      <div class="user-menu-wrap" *ngIf="user">
        <button
          class="user-btn"
          (click)="toggleUserMenu()"
          [class.open]="userMenuOpen"
          type="button"
          aria-haspopup="true"
          [attr.aria-expanded]="userMenuOpen"
          aria-label="Open user menu">
          <span class="user-avatar">{{ userInitial }}</span>
          <span class="user-name">{{ userFirstName }}</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="user-dropdown" *ngIf="userMenuOpen">
          <div class="dropdown-header">
            <div>
              <span class="dropdown-name">{{ user.fullName }}</span>
              <span class="dropdown-email">{{ user.email }}</span>
            </div>
            <span class="role-chip">{{ roleLabel }}</span>
          </div>
          <button class="dropdown-item danger" (click)="logout()" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Sign Out
          </button>
        </div>
      </div>
      <button
        class="hamburger"
        (click)="toggleMobile()"
        [class.open]="mobileOpen"
        type="button"
        aria-label="Toggle menu"
        aria-controls="nav-drawer"
        [attr.aria-expanded]="mobileOpen">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="mobile-drawer" *ngIf="mobileOpen" id="nav-drawer">
    <ul class="mobile-links" *ngIf="user">
      <li *ngFor="let link of navLinks; let i = index; trackBy: trackByPath" [style.animation-delay]="(i * .06) + 's'" class="animate-slide-up">
        <a [routerLink]="link.path" routerLinkActive="active" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>
    <ul class="mobile-links" *ngIf="!user">
      <li *ngFor="let link of publicLinks; let i = index; trackBy: trackByFragment" [style.animation-delay]="(i * .06) + 's'" class="animate-slide-up">
        <a [routerLink]="['/']" [fragment]="link.fragment" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>
    <div class="mobile-actions" *ngIf="!user">
      <a routerLink="/" fragment="contact" class="outline-btn btn-sm" (click)="closeMobile()">Contact</a>
      <a routerLink="/auth/login" class="primary-btn btn-sm" (click)="closeMobile()">Log In</a>
    </div>
    <button *ngIf="user" class="outline-btn btn-sm danger" (click)="logout()" type="button">Sign Out</button>
  </div>
</nav>
