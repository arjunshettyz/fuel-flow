<nav class="navbar" [class.scrolled]="scrolled">
  <div class="navbar-inner">
    <a class="brand" routerLink="/" (click)="closeMobile()">
      <span class="brand-icon" aria-hidden="true">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
          <path d="M12 2L2 7l10 5 10-5-10-5z" fill="url(#nb1)"/>
          <path d="M2 17l10 5 10-5M2 12l10 5 10-5" stroke="url(#nb2)" stroke-width="2" stroke-linecap="round"/>
          <defs>
            <linearGradient id="nb1" x1="2" y1="2" x2="22" y2="12" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#a78bfa"/></linearGradient>
            <linearGradient id="nb2" x1="2" y1="12" x2="22" y2="22" gradientUnits="userSpaceOnUse"><stop stop-color="#60a5fa"/><stop offset="1" stop-color="#34d399"/></linearGradient>
          </defs>
        </svg>
      </span>
      <span class="brand-name">Fuel<span>Flow</span></span>
    </a>

    <ul class="nav-links" *ngIf="user">
      <li *ngFor="let link of navLinks">
        <a [routerLink]="link.path" routerLinkActive="active" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>

    <div class="nav-right">
      <app-language-toggle></app-language-toggle>
      <ng-container *ngIf="!user">
        <a routerLink="/auth/login" class="btn btn-ghost btn-sm">Login</a>
        <a routerLink="/auth/register" class="btn btn-primary btn-sm">Sign Up</a>
      </ng-container>
      <div class="user-menu-wrap" *ngIf="user">
        <button class="user-btn" (click)="toggleUserMenu()" [class.open]="userMenuOpen" type="button">
          <span class="user-avatar">{{ user.fullName.charAt(0).toUpperCase() }}</span>
          <span class="user-name">{{ user.fullName.split(" ")[0] }}</span>
          <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </button>
        <div class="user-dropdown" *ngIf="userMenuOpen">
          <div class="dropdown-header">
            <span class="dropdown-name">{{ user.fullName }}</span>
            <span class="badge badge-info">{{ roleLabel }}</span>
          </div>
          <div class="dropdown-email">{{ user.email }}</div>
          <hr style="border:none;border-top:1px solid var(--border);margin:.5rem 0">
          <button class="dropdown-item danger" (click)="logout()" type="button">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
            Sign Out
          </button>
        </div>
      </div>
      <button class="hamburger" (click)="toggleMobile()" [class.open]="mobileOpen" type="button" aria-label="Toggle menu">
        <span></span><span></span><span></span>
      </button>
    </div>
  </div>

  <div class="mobile-drawer" *ngIf="mobileOpen">
    <ul class="mobile-links" *ngIf="user">
      <li *ngFor="let link of navLinks; let i = index" [style.animation-delay]="(i*.05)+'s'" class="animate-slide-up">
        <a [routerLink]="link.path" routerLinkActive="active" (click)="closeMobile()">{{ link.label }}</a>
      </li>
    </ul>
    <ng-container *ngIf="!user">
      <a routerLink="/auth/login" class="btn btn-secondary btn-sm" style="margin:.5rem 1.25rem" (click)="closeMobile()">Login</a>
      <a routerLink="/auth/register" class="btn btn-primary btn-sm" style="margin:.5rem 1.25rem" (click)="closeMobile()">Sign Up</a>
    </ng-container>
    <button *ngIf="user" class="btn btn-danger btn-sm" style="margin:.5rem 1.25rem" (click)="logout()" type="button">Sign Out</button>
  </div>
</nav>
