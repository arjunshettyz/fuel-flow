<article class="card chat-panel">
	<header class="chat-header">
		<div>
			<h2>{{ title }}</h2>
			<p>{{ subtitle }}</p>
		</div>
		<span class="chat-status">Online</span>
	</header>

	<div class="chat-body">
		<div class="chat-message" *ngFor="let message of messages" [class.user]="message.sender === 'user'">
			<div class="bubble">{{ message.text }}</div>
			<span class="timestamp">{{ message.time }}</span>
		</div>
		<div class="chat-message typing" *ngIf="isResponding">
			<div class="bubble">Typing...</div>
		</div>
	</div>

	<div class="chat-suggestions" *ngIf="suggestions.length">
		<button class="chip" type="button" *ngFor="let suggestion of suggestions" (click)="useSuggestion(suggestion)">
			{{ suggestion }}
		</button>
	</div>

	<div class="chat-input">
		<input
			type="text"
			[(ngModel)]="draft"
			(keydown.enter)="send()"
			[placeholder]="placeholder" />
		<button class="primary-btn btn-sm" type="button" (click)="send()">Send</button>
	</div>
</article>
