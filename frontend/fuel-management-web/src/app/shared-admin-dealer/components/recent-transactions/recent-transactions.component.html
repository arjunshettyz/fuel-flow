<div class="tx-table-wrap">
	<table class="tx-table">
		<thead>
			<tr>
				<th>Date</th>
				<th>Vehicle</th>
				<th>Fuel</th>
				<th>Litres</th>
				<th>Amount</th>
			</tr>
		</thead>
		<tbody>
			<tr *ngFor="let row of rows">
				<td>{{ row.date }}</td>
				<td>{{ row.vehicle }}</td>
				<td>{{ row.fuelType }}</td>
				<td>{{ row.litres | number: '1.1-1' }}</td>
				<td>{{ row.amount | currency: 'INR' : 'symbol' : '1.0-0' }}</td>
			</tr>
		</tbody>
	</table>
</div>
