<section class="auth-page">
	<div class="auth-compact">
		<a class="back-home" routerLink="/">Back to landing</a>
		<h1>Reset Password</h1>
		<p *ngIf="identifier">Resetting password for: {{ identifier }}</p>
		<form [formGroup]="form" (ngSubmit)="submit()">
			<label>
				OTP
				<input type="text" formControlName="otp" maxlength="6" />
			</label>
			<label>
				New Password
				<input type="password" formControlName="password" />
			</label>
			<label>
				Confirm Password
				<input type="password" formControlName="confirmPassword" />
			</label>
			<small class="error" *ngIf="form.hasError('mismatch')">Passwords do not match.</small>
			<button type="submit" class="primary-btn" [disabled]="isSubmitting">{{ isSubmitting ? 'Resetting...' : 'Reset Password' }}</button>
		</form>

		<div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>
		<div class="ok-banner" *ngIf="infoMessage">{{ infoMessage }}</div>
		<div class="ok-banner" *ngIf="resetDone">Password reset complete.</div>
	</div>
</section>
