<section class="auth-page">
	<div class="auth-compact">
		<a class="back-home" routerLink="/">Back to landing</a>
		<h1>OTP Verification</h1>
		<p>Validate your email OTP to continue login.</p>

		<form [formGroup]="form" (ngSubmit)="submit()">
			<label>
				Email Address
				<input type="email" formControlName="email" />
			</label>
			<small class="error" *ngIf="form.controls.email.touched && form.controls.email.invalid">Enter a valid email address.</small>

			<div class="role-select">
				<span class="role-label">Login as</span>
				<div class="role-options">
					<label class="role-pill" [class.active]="form.controls.role.value === 'Customer'">
						<input type="radio" formControlName="role" value="Customer" />
						<span>Customer</span>
					</label>
					<label class="role-pill" [class.active]="form.controls.role.value === 'Dealer'">
						<input type="radio" formControlName="role" value="Dealer" />
						<span>Dealer</span>
					</label>
					<label class="role-pill" [class.active]="form.controls.role.value === 'Admin'">
						<input type="radio" formControlName="role" value="Admin" />
						<span>Admin</span>
					</label>
				</div>
			</div>

			<button class="outline-btn" type="button" (click)="sendOtp()" [disabled]="isSendingOtp || form.controls.email.invalid">
				{{ isSendingOtp ? 'Sending OTP...' : 'Send Email OTP' }}
			</button>

			<label>
				OTP
				<input type="text" maxlength="6" formControlName="otp" />
			</label>
			<small class="error" *ngIf="form.controls.otp.touched && form.controls.otp.invalid">Enter a valid 6-digit OTP.</small>

			<button class="primary-btn" type="submit" [disabled]="isSubmitting">{{ isSubmitting ? 'Verifying...' : 'Login with OTP' }}</button>
		</form>

		<small *ngIf="!otpSent">Request OTP using your email address.</small>
		<div class="ok-banner" *ngIf="infoMessage">{{ infoMessage }}</div>
		<div class="error-banner" *ngIf="message">{{ message }}</div>
	</div>
</section>
