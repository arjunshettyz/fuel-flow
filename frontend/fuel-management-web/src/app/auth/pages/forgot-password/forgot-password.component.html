<section class="auth-page">
	<div class="auth-compact">
		<a class="back-home" routerLink="/">Back to landing</a>
		<h1>Forgot Password</h1>
		<p>Enter your email or phone to receive reset instructions.</p>

		<form [formGroup]="form" (ngSubmit)="submit()">
			<label>
				Email or Mobile
				<input type="text" formControlName="identifier" />
			</label>

			<button type="submit" class="primary-btn" [disabled]="sending">
				{{ sending ? 'Sending OTP...' : 'Send OTP' }}
			</button>
		</form>

		<div class="error-banner" *ngIf="errorMessage">{{ errorMessage }}</div>
		<div class="ok-banner" *ngIf="infoMessage">{{ infoMessage }}</div>

		<div *ngIf="sent" class="otp-actions">
			<button type="button" class="outline-btn" (click)="resendOtp()" [disabled]="resendSecondsLeft > 0 || sending">
				{{ resendSecondsLeft > 0 ? ('Resend OTP in ' + resendSecondsLeft + 's') : 'Resend OTP' }}
			</button>
			<button type="button" class="primary-btn" (click)="goToResetPassword()">Continue to Reset Password</button>
		</div>

		<div class="ok-banner" *ngIf="sent">OTP sent successfully. Updates: Identity service OTP store (email token table).</div>
		<a routerLink="/auth/login">Back to login</a>
	</div>
</section>
