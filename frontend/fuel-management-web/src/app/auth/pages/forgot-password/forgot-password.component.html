<section class="auth-page">
	<div class="auth-compact">
		<a class="back-home" routerLink="/">Back to landing</a>
		<h1>Forgot Password</h1>
		<p>Enter your email or phone to receive reset instructions.</p>

		<form [formGroup]="form" (ngSubmit)="submit()">
			<label>
				Email or Mobile
				<input type="text" formControlName="identifier" />
			</label>

			<button type="submit" class="primary-btn">Send Reset Link / OTP</button>
		</form>

		<div class="ok-banner" *ngIf="sent">Reset instructions sent.</div>
		<a routerLink="/auth/login">Back to login</a>
	</div>
</section>
